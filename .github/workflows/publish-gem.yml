name: Push to rubygems.org

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - uses: rubygems/release-gem@v1
